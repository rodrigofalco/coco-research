    <script>
      const md = "# pi-agent and tmux tips and tricks\n\n_Research date: 2026-03-02_\n\n---\n\n## claude-sonnet-4-6\n\nSteering: Save your complete research report to this file using the write tool:\n ↳ Alt+Up to edit all queued messages\n\n---\n\n## gemini-3-flash\n\n# Pi-Agent and Tmux: Tips and Tricks\n\nThis report covers advanced usage and optimization tips for the `pi-agent` (`@mariozechner/pi-coding-agent`) and its integration with `tmux` for parallel agent workflows.\n\n---\n\n## 🚀 Pi-Agent: Core Interactivity Tips\n\n### 1. Smart Context Management\n- **File References (`@`):** Type `@` in the editor to fuzzy-search and include files in your prompt. This is faster and more precise than manually typing paths.\n- **Context Compaction (`/compact`):** If a session gets too long, use `/compact` to summarize previous messages and free up context window space. You can provide custom instructions for the summary.\n- **Ephemeral Sessions (`--no-session`):** Use this flag for one-off tasks where you don't want to clutter your session history.\n\n### 2. Powerful Commands & Shortcuts\n- **Bash Execution (`!` vs `!!`):**\n    - `!command`: Runs the command and sends the output to the LLM.\n    - `!!command`: Runs the command locally without sending output (useful for quick side-tasks).\n- **Thinking Levels (`Shift+Tab`):** Quickly cycle through thinking levels (`off`, `minimal`, `low`, `medium`, `high`, `xhigh`) depending on the complexity of the task.\n- **Message Queuing:**\n    - `Enter`: Submits a *steering* message that interrupts current tool execution.\n    - `Alt+Enter`: Submits a *follow-up* message that only delivers after the agent completes all current work.\n- **Session Tree (`/tree` or `Esc Esc`):** Jump back to any point in the history and branch off. This is much better than \"undoing\" manually.\n\n### 3. Editor Tricks\n- **Multi-line Input:** Use `Shift+Enter` for multi-line messages (ensure your terminal is configured for the Kitty keyboard protocol).\n- **External Editor (`Ctrl+G`):** If the terminal editor is too limiting, hit `Ctrl+G` to open the current buffer in your `$EDITOR` (e.g., Vim, Nano).\n- **Clipboard Integration:** `Ctrl+V` (or `Alt+V` on Windows) pastes images directly from your clipboard into the agent session.\n\n---\n\n## 🛠️ Advanced Customization\n\n### 1. Skills and Prompt Templates\n- **Prompt Templates:** Create `.md` files in `.pi/prompts/` to define reusable prompt snippets (e.g., `/review`, `/test`).\n- **Skills:** Define modular capabilities in `SKILL.md` files following the [Agent Skills standard](https://agentskills.io). Pi can load these automatically when relevant.\n\n### 2. Extensions\nExtensions are the most powerful way to customize Pi. They allow you to:\n- Register custom tools and commands.\n- Modify compaction behavior.\n- Add UI widgets to the footer or overlays.\n- Implement sub-agent flows or MCP integrations.\n\n---\n\n## 🐚 Tmux Integration: Parallel Agent Workflows\n\nThe `coco-personal-assistant` project demonstrates a sophisticated \"Fan-Out\" pattern using tmux to orchestrate multiple agents.\n\n### 1. Orchestration Strategy\n- **Controller/Worker Architecture:** Use one pane (Pane 0) as the \"Controller\" to read files and orchestrate. Spawn \"Worker\" panes for heavy lifting (builds, tests, or other agents).\n- **Dynamic Pane Tiling:** Use `tmux select-layout main-vertical` and `tmux resize-pane` to maintain a consistent workspace layout (e.g., 65% width for the main controller).\n\n### 2. Fan-Out Pattern (Multi-Model Research)\n- **Staggered Spawns:** When launching multiple pi instances simultaneously, add a short delay (e.g., `sleep 5`) between spawns to prevent lockfile contention on `~/.pi/agent/auth.json`.\n- **Readiness Detection:** Before sending tasks to a tmux-managed agent, capture the pane output and check for the pi status bar (e.g., the presence of `$0.000` or the cost indicator). This ensures the agent is fully booted and ready for input.\n- **Task Injection via Files:** Instead of sending long strings via `tmux send-keys`, write the task to a temp file and launch pi with `pi @/tmp/task.md`. This avoids escaping issues and ensures the agent starts working immediately.\n\n### 3. Clean Output Collection\n- **Terminal Noise Filtering:** When using `tmux capture-pane` to collect results from an agent, filter out terminal noise such as:\n    - Status bars and spinners (⠋⠙⠹...).\n    - Separator lines (───).\n    - Session path lines (~/...).\n    - Authentication/version messages.\n- **File-First Collection:** Instruct worker agents to save their final output to a specific file (e.g., `/tmp/result.md`) and use `tmux capture` only as a fallback.\n\n---\n\n## 🔧 Setup & Troubleshooting\n\n### 1. Terminal Configuration\nFor the best experience (especially `Shift+Enter` and modifier detection), ensure your terminal supports the **Kitty keyboard protocol**. \n- **Ghostty/WezTerm:** Highly recommended as they support it natively.\n- **VS Code/Windows Terminal:** Require specific `sendSequence` keybindings (see Pi docs).\n\n### 2. IPv6 Issues\nIf Telegram or other APIs hang, it might be an IPv6 routing issue. A common fix is to force IPv4 in Node.js by monkey-patching `https.Agent` to inject an IPv4-only DNS lookup, as seen in the `coco-personal-assistant` entry point.\n\n### 3. Subscription Management\nUse `/login` to manage your Claude Pro, ChatGPT Plus, or Google Gemini subscriptions through the Pi SDK without needing individual API keys for every provider.\n";
