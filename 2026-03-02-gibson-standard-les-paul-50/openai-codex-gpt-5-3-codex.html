    <script>
      const md = "# gibson standard les paul 50 — openai-codex/gpt-5.3-codex\n\n---\n\n# Research Report: Gibson Les Paul Standard ’50s\n\n## Executive Summary\nThe **Gibson Les Paul Standard ’50s** (often referred to informally as the “Les Paul Standard 50” or “LP Standard 50s”) is Gibson USA’s modern production take on late-1950s Les Paul design. It is one of the flagship “Original Collection” models and is aimed at players who want traditional Les Paul feel and tone without moving into Custom Shop pricing.\n\nIn practical terms, the model is defined by:\n- **Mahogany body + maple cap** (typically with modern weight relief omitted)\n- **Set mahogany neck** with a **rounded 50s profile**\n- **24.75\" scale**, **12\" radius**, **22 medium-jumbo frets**\n- **Vintage-style ABR-1 Tune-O-Matic + stop bar tailpiece**\n- **Burstbucker 1 (neck) + Burstbucker 2 (bridge)** with Alnico II magnets\n- **Hand-wired controls with Orange Drop capacitors**\n\nThis gives a thicker neck feel, strong sustain, and a warm-but-punchy PAF-inspired humbucker voice. It is often compared directly with the Les Paul Standard ’60s (slimmer neck, hotter/brighter pickup flavor depending year/spec).\n\n---\n\n## 1) Model Context and Position in Gibson’s Lineup\n\n### Where it sits\nThe Les Paul Standard ’50s is part of Gibson USA’s **Original Collection**, intended to capture classic spec direction rather than modern appointments.\n\n### Typical buyer profile\n- Players wanting a “classic” Les Paul experience (substantial neck, vintage-leaning tones)\n- Gigging/studio musicians who want Gibson USA quality and resale strength\n- Buyers priced out of Historic Reissue/Custom Shop instruments\n\n### Closest internal alternatives\n- **Les Paul Standard ’60s**: slimmer neck, generally more modern fast-feel preference\n- **Les Paul Classic / Modern**: more feature-rich or modern-voiced options (coil splits, weight relief, etc., depending run/year)\n- **Custom Shop R8/R9**: higher-end vintage-accurate approach with corresponding price increase\n\n---\n\n## 2) Core Specifications (Most Common Production Configuration)\n\n> Specs can shift by production year/finish run; always verify official listing for a specific serial number.\n\n### Body and Top\n- **Body**: Mahogany\n- **Top**: AA figured maple top (on many figured finishes) or plain maple on plain-top variants\n- **Construction**: Set-neck, carved top\n- **Weight relief**: Historically marketed in this series as **non-weight-relieved** (varies by exact SKU/production details)\n\n### Neck and Fingerboard\n- **Neck wood**: Mahogany\n- **Profile**: **Rounded 50s Vintage** (chunkier than ’60s profile)\n- **Scale length**: 24.75\"\n- **Fingerboard**: Rosewood (some years may have regulatory substitutions on some models)\n- **Radius**: 12\"\n- **Frets**: 22 medium jumbo\n- **Nut**: Graph Tech (commonly 1.695\" width)\n\n### Hardware\n- **Bridge**: ABR-1 Tune-O-Matic (vintage-style)\n- **Tailpiece**: Aluminum Stop Bar\n- **Tuners**: Vintage Deluxe / Kluson-style\n- **Pickguard**: Cream (finish dependent)\n\n### Electronics\n- **Pickups**: Burstbucker 1 (neck), Burstbucker 2 (bridge)\n- **Magnets**: Alnico II\n- **Controls**: 2 volume, 2 tone, 3-way switch\n- **Wiring style**: Hand-wired with Orange Drop capacitors on many current-standard specs\n\n---\n\n## 3) Tone Profile\n\n### General tonal character\n- **Neck pickup (BB1)**: round, vocal, woody mids; excels for blues, jazz-blues, classic rock lead tones\n- **Bridge pickup (BB2)**: tighter, brighter attack than neck while still vintage PAF-like; strong for classic/hard rock rhythm and singing leads\n\n### How the 50s neck contributes\nA larger neck can subtly influence feel and response, and many players report:\n- Perceived stronger sustain and “authority” in note bloom\n- Comfortable support for thumb-over and bend-heavy styles\n- Better fatigue profile for some players; too large for others\n\n### Genre fit\n- Excellent: blues, classic rock, roots rock, hard rock, indie, worship, session work\n- Usable with gain-heavy genres, though some players may prefer hotter pickups for modern metal without boosts\n\n---\n\n## 4) Playability and Ergonomics\n\n### Neck feel\nThe **Rounded 50s** profile is the main differentiator. It is usually described as:\n- Substantial/chunky in hand\n- Less “shred-fast” than slim-taper but often more “anchored” feeling\n\n### Action and setup from factory\n- Typical Gibson USA setup is generally stage-usable but often benefits from personalized adjustment (nut slot fine-tuning, relief/action intonation)\n- String gauge frequently shipped around .010–.046 territory (varies)\n\n### Weight considerations\nA key practical issue for Les Paul buyers:\n- Many Standard ’50s examples are in a moderate-to-heavy range\n- Shoulder comfort matters for long gigs; always check actual instrument weight before purchase\n\n---\n\n## 5) Build Quality and Consistency Trends\n\n### Strengths commonly reported\n- Strong finishing quality on top carve and bursts\n- Good fretwork in many recent runs\n- Stable tuning once nut/bridge are dialed in\n\n### Typical “watch list” items at purchase\n- Nut slot height consistency\n- Minor finish sink/checking sensitivity due to nitrocellulose lacquer characteristics\n- Weight variation between units\n- Pickup height from factory (often needs optimization)\n\n**Recommendation:** Buy from a dealer with excellent setup/QC and return policy, or play multiple examples in person.\n\n---\n\n## 6) Finish Options and Visual Variants\n\nFrequently seen finishes (availability changes by year/region):\n- Heritage Cherry Sunburst\n- Tobacco Burst\n- Gold Top (in specific variant SKUs)\n- Iced Tea / Honey Amber style bursts\n\nVisual details often associated with the ’50s Standard line:\n- Trapezoid inlays\n- Cream plastics on many finishes\n- Vintage-leaning control aesthetics (gold or amber top hats depending run)\n\n---\n\n## 7) Comparison: Les Paul Standard ’50s vs ’60s\n\n| Category | Standard ’50s | Standard ’60s |\n|---|---|---|\n| Neck profile | Rounded/chunkier | SlimTaper/faster-feel |\n| Pickup flavor (common) | BB1+BB2 vintage-leaning | Often BB61 set (year dependent) with brighter/hotter tendency |\n| Feel target | Vintage heft | Modern speed within vintage framework |\n| Buyer preference | Big-neck fans | Players preferring thinner necks |\n\nIf undecided, neck profile alone often decides the purchase.\n\n---\n\n## 8) New and Used Market Economics (General)\n\n> Prices vary by country, year, finish rarity, and dealer promotions.\n\n### New market\n- Positioned in upper-premium USA production tier, below Custom Shop\n- Street pricing often fluctuates with finish and limited runs\n\n### Used market\n- Typically strong liquidity due to model recognition\n- Discounts from new commonly depend on condition, fret wear, case candy, and finish desirability\n- Heavier weights sometimes sell slower; desirable top figure and lower weights can command premiums\n\n### Resale value drivers\n- Clean headstock/neck condition (critical)\n- Original pickups/harness/hardware retained\n- Original hard shell case and documentation\n- Popular finishes and attractive top figure\n\n---\n\n## 9) Authenticity and Verification Checklist\n\nWhen evaluating a used Gibson Les Paul Standard ’50s:\n1. **Serial number + made-in-USA markings** consistency\n2. **Headstock logo/inlay quality** and truss rod cover correctness\n3. **Control cavity inspection** for wiring style and pot codes\n4. **Bridge/tailpiece/tuner type** matching expected spec\n5. **Neck joint and headstock repair check** under bright angled light\n6. **Case and paperwork** cross-check with seller claims\n\nCounterfeits exist in the broader Les Paul market; careful verification is important.\n\n---\n\n## 10) Common Modifications\n\nEven players who love stock spec often do:\n- **Pickup height and pole piece balancing** (big tonal gains at zero cost)\n- **Nut optimization** (tuning stability, feel)\n- **Electronics tweaks**: alternate cap values, 50s wiring preference confirmation, treble-bleed decisions\n- **Pickup swaps** for specific output/EQ goals\n- **Locking tuner retrofits** (reversible if done carefully)\n\nStock electronics are already strong; many users keep them original.\n\n---\n\n## 11) Maintenance and Ownership Notes\n\n### Nitrocellulose lacquer care\n- Can react with some stands/straps (plasticizers)\n- Use nitro-safe hangers/stands and gentle guitar polish\n- Finish checking is a known behavior over time/temperature swings\n\n### Seasonal setup\n- Humidity and temperature changes can require truss rod/action tweaks\n- Regular fretboard conditioning (sparingly) and fret maintenance prolong playability\n\n### Transport and storage\n- Hard case recommended\n- Avoid heat exposure (cars/stages in direct sun)\n\n---\n\n## 12) Pros and Cons Summary\n\n### Pros\n- Classic Les Paul tone and feel with strong heritage value\n- Rounded 50s neck favored by many for comfort/tone authority\n- High resale confidence compared to many peers\n- Versatile PAF-style pickup set\n\n### Cons\n- Weight can be substantial\n- Chunky neck is not universally comfortable\n- Nitro finish requires careful handling\n- Price is premium versus import alternatives\n\n---\n\n## 13) Who Should Buy It?\n\nBest fit:\n- You want a **traditional Les Paul** with minimal modern compromises\n- You prefer **chunkier necks**\n- You value **vintage-leaning humbucker tones** and strong resale\n\nConsider alternatives if:\n- You need lighter weight for long gigs (consider weight-relieved variants)\n- You prefer very slim necks (try Standard ’60s)\n- You need aggressive modern high-output tone stock (consider different pickup platforms)\n\n---\n\n## 14) Practical Buying Strategy\n\n1. **Play at least 2–5 examples** (unit-to-unit variation matters)\n2. **Check actual weight** before committing\n3. **A/B against Standard ’60s** immediately to isolate neck preference\n4. **Inspect fret ends, nut, and tuning stability** on open chords + bends\n5. **Negotiate based on setup needs**, not only cosmetics\n6. For used purchases, request **high-resolution cavity/headstock photos**\n\n---\n\n## 15) Bottom Line\n\nThe **Gibson Les Paul Standard ’50s** is one of the strongest “core identity” Gibson USA offerings: classic woods, classic geometry, vintage-voiced Burstbuckers, and a substantial neck profile that many players specifically seek out. Its main tradeoffs are weight and neck heft, both of which are personal-fit factors rather than objective flaws. If those align with your preferences, it is a high-confidence long-term instrument for studio, stage, and collection value.\n";
