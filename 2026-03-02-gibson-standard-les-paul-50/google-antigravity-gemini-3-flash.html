      const md = "# gibson standard les paul 50 — google-antigravity/gemini-3-flash\n\n---\n\n# Research Report: Gibson Les Paul Standard '50s\n\n## Overview\nThe Gibson Les Paul Standard '50s is a cornerstone of Gibson's **Original Collection**. It is designed to pay tribute to the Golden Era of Gibson innovation, specifically the late 1950s. This model eschews modern \"improvements\" like weight relief and coil-tapping in favor of traditional construction and vintage-voiced electronics.\n\n## Key Specifications and Features\n\n### Body and Neck\n*   **Body Material:** Solid Mahogany.\n*   **Top Material:** Maple (usually AA Figured Maple for Sunburst finishes, or plain maple for Goldtops).\n*   **Weight Relief:** **None**. This is a \"solid-body\" guitar in the traditional sense, which contributes to its signature sustain but results in a heavier instrument (often 9-11 lbs).\n*   **Finish:** Gloss Nitrocellulose Lacquer.\n*   **Neck Profile:** **Vintage '50s**. This is a thicker, rounded profile often described as a \"baseball bat\" neck, though many players find it surprisingly ergonomic.\n*   **Scale Length:** 24.75\".\n*   **Fingerboard:** Rosewood with a 12\" radius and 22 Medium Jumbo frets.\n\n### Electronics and Hardware\n*   **Pickups:** Burstbucker 1 (Neck) and Burstbucker 2 (Bridge).\n    *   These pickups use **Alnico 2 magnets**.\n    *   They are designed to replicate the \"Patent Applied For\" (PAF) humbuckers of the late 50s, offering a warm, woody tone with clear highs and a smooth low end.\n*   **Controls:** 2 Volume, 2 Tone; hand-wired with **Orange Drop capacitors**.\n*   **Bridge:** ABR-1 Tune-O-Matic bridge.\n*   **Tailpiece:** Aluminum Stop Bar.\n*   **Tuners:** Vintage Deluxe tuners with Keystone buttons.\n\n## Tonal Character\nThe '50s Standard is known for its **warmth and sustain**. The Alnico 2 magnets in the Burstbuckers are lower output than Alnico 5 magnets, allowing for more touch sensitivity and a \"bloom\" to the notes. It excels at blues, classic rock, and jazz. When played through a high-gain amp, it maintains a creamy, thick distortion without becoming overly harsh.\n\n## Comparison: Standard '50s vs. Standard '60s\nThe primary choice for many buyers is between the '50s and '60s models. The '60s model differs in the following ways:\n*   **Neck:** SlimTaper profile (thinner).\n*   **Pickups:** 60s Burstbuckers with **Alnico 5 magnets** (higher output, brighter, more aggressive).\n*   **Tuners:** Grover Rotomatics.\n*   **Aesthetics:** Silver reflector knobs and different sunburst shades (like Unburst or Iced Tea).\n\n## Historical Significance\nThe original Les Paul Standards from 1958, 1959, and 1960 are some of the most valuable and sought-after vintage guitars in the world. The current '50s Standard is Gibson's attempt to capture that magic in a production-line instrument that is more accessible than the \"Historic Reissue\" models produced by the Gibson Custom Shop.\n\n## Conclusion\nThe Gibson Les Paul Standard '50s is an ideal instrument for the traditionalist. It offers the classic \"weight,\" \"feel,\" and \"tone\" that defined the electric guitar's golden age. Its return to solid-body construction and hand-wired electronics has been widely celebrated as a \"return to form\" for the Gibson brand.\n";
